# Общие оптимизации (http-level; conf.d включается в http{} официального образа).
# Префикс 00- — грузится первым. Только безопасные глобальные директивы.

# Сжатие текстовых ответов (API JSON, CSS/JS фронта). Картинки/шрифты уже сжаты.
gzip              on;
gzip_vary         on;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_proxied      any;
gzip_types
    application/json
    application/javascript
    application/xml
    text/css
    text/plain
    text/javascript
    image/svg+xml;

# Скрыть версию nginx в заголовках/ошибках (keepalive_timeout уже в nginx.conf).
server_tokens     off;
