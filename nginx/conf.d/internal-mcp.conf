# ai-box-mcp — внутренний control plane MCP, наружу не публикуется.
# Порт 8084 не проброшен на хост: доступен только с сети ecosystem,
# потребители ходят на http://gateway:8084 (alias сервиса nginx).

server {
    listen 8084;
    server_name _;

    root /var/www/ai-box-mcp/public;
    index index.php;
    charset utf-8;

    access_log /var/log/nginx/mcp.access.log;
    error_log  /var/log/nginx/mcp.error.log;

    client_max_body_size 40M;

    resolver 127.0.0.11 valid=10s;
    set $mcp_upstream ai-box-mcp-php:9000;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/php-fastcgi.conf;
        fastcgi_read_timeout 120;
        fastcgi_pass $mcp_upstream;
    }

    location ~ /\.(ht|env|git) {
        deny all;
    }
}
