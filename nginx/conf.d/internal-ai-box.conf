# ai-box — внутренний межсервисный vhost (например, для ai-box-mcp:
# AIBOX_BASE_URL=http://gateway:8085). Наружу не публикуется: порт 8085
# доступен только с сети ecosystem. Публичный вход ai-box — vhost'ы
# api./admin. на 443.

server {
    listen 8085;
    server_name _;

    root /var/www/ai-box/public;
    index index.php;
    charset utf-8;

    access_log /var/log/nginx/internal-ai-box.access.log;
    error_log  /var/log/nginx/internal-ai-box.error.log;

    client_max_body_size 40M;

    resolver 127.0.0.11 valid=10s;
    set $ai_box_upstream ai-box-php:9000;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/php-fastcgi.conf;
        fastcgi_read_timeout 120;
        fastcgi_pass $ai_box_upstream;
    }

    location ~ /\.(ht|env|git) {
        deny all;
    }
}
