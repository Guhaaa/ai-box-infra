# ai-box-data-registry — внутренний HTTP API, наружу не публикуется.
# Порт 8083 не проброшен на хост: доступен только с сети ecosystem,
# потребители ходят на http://gateway:8083 (alias сервиса nginx).

server {
    listen 8083;
    server_name _;

    root /var/www/ai-box-data-registry/public;
    index index.php;
    charset utf-8;

    access_log /var/log/nginx/dr.access.log;
    error_log  /var/log/nginx/dr.error.log;

    client_max_body_size 100M;

    resolver 127.0.0.11 valid=10s;
    set $dr_upstream ai-box-dr-php:9000;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/php-fastcgi.conf;
        # Ingest больших документов может быть долгим
        fastcgi_read_timeout 300;
        fastcgi_pass $dr_upstream;
    }

    location ~ /\.(ht|env|git) {
        deny all;
    }
}
