# Общие TLS-настройки публичных vhost'ов.
# Сертификат один (SAN на все домены ai-box), см. certs-init в Makefile.
ssl_certificate     /etc/letsencrypt/live/ai-box.amulex.ru/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/ai-box.amulex.ru/privkey.pem;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1h;
