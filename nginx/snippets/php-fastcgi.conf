# Общие fastcgi-параметры. fastcgi_pass и fastcgi_read_timeout задаются
# в vhost'е (у каждого приложения свой php-fpm контейнер и свой таймаут).
fastcgi_index index.php;
fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
include fastcgi_params;

# Буферы под ответы php-fpm: крупные JSON/HTML не сбрасываются во временные
# файлы на диск (дефолтные 4×4k малы для API-ответов).
fastcgi_buffers        16 16k;
fastcgi_buffer_size    32k;
fastcgi_busy_buffers_size 64k;
