[www]
; Стек на сети ecosystem (ai-box-infra): fpm слушает 9000 на интерфейсе
; контейнера, к нему ходит только nginx инфры по имени ai-box-php:9000.
; Сеть закрытая (bridge ecosystem, наружу не публикуется).
listen = 9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
