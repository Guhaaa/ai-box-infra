name: Deploy doitai.ru
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-doitai-infra
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH-ключ
        env:
          DOITAI_SSH_KEY: ${{ secrets.DOITAI_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DOITAI_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # host-ключ запинен (не TOFU через ssh-keyscan)
          echo "doitai.ru ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKAzKhVYdxJvj3XWJPBAtH2BvNiCcYTUmrkL6rEQ0hQb" >> ~/.ssh/known_hosts

      - name: Деплой инфра-стека
        run: |
          ssh guha@doitai.ru 'cd /var/www/ai-box-infra && git pull origin master && make build-base && make up && make nginx-reload'
